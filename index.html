    if (total && fl.length) {
        const totalTiles = fl.reduce((s,i) => s + i.cells.size, 0);
        const totalCost  = fl.reduce((s,i) => s + i.cells.size * (ROOMS_DB[i.roomType]?.cost||2), 0);
        total.innerHTML = `
            <div class="c-queue-total-line"><span>Тайлов:</span><span>${totalTiles}</span></div>
            <div class="c-queue-total-line bold"><span>Итого металла:</span><span>${totalCost}</span></div>`;
    }
}

// ════════════════════════════════════════════════════════
//  POINTER-BASED DRAG & DROP — исправленный
//  Позиция вставки определяется по середине каждого элемента:
//  курсор выше середины → вставить ПЕРЕД, ниже → вставить ПОСЛЕ.
// ════════════════════════════════════════════════════════
let _dnd = null;

function onHandlePointerDown(e) {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();

    const handle = e.currentTarget;
    const itemEl = handle.closest('.c-queue-item');
    const id     = parseInt(handle.dataset.dragId);
    const list   = document.getElementById('cQueueList');

    // Визуальный призрак
    const ghost = itemEl.cloneNode(true);
    ghost.style.cssText = `
        position:fixed; pointer-events:none; z-index:9999;
        width:${itemEl.offsetWidth}px; opacity:0.85;
        background:#1a2535; border:1px solid #00e5ff;
        border-radius:6px; padding:8px; font-size:12px;
        box-shadow:0 8px 24px rgba(0,0,0,0.6);
        transform:rotate(1.5deg); transition:none;
    `;
    document.body.appendChild(ghost);

    const elRect  = itemEl.getBoundingClientRect();
    const offsetY = e.clientY - elRect.top;
    itemEl.classList.add('dragging-item');

    // insertRef: { el, position:'before'|'after' } | null (append at end)
    _dnd = { id, itemEl, ghost, list, offsetY, insertRef: null };
    _positionGhost(e.clientX, e.clientY);

    document.addEventListener('pointermove',   _onDndMove, { passive: false });
    document.addEventListener('pointerup',     _onDndUp,   { once: true });
    document.addEventListener('pointercancel', _onDndUp,   { once: true });
}

function _positionGhost(cx, cy) {
    if (!_dnd) return;
    _dnd.ghost.style.left = (cx + 12) + 'px';
    _dnd.ghost.style.top  = (cy - _dnd.offsetY) + 'px';
}

function _clearDndIndicators() {
    document.querySelectorAll('.c-queue-item').forEach(el => {
        el.classList.remove('drag-insert-before', 'drag-insert-after');
    });
}

function _onDndMove(e) {
    if (!_dnd) return;
    e.preventDefault();
    _positionGhost(e.clientX, e.clientY);
    _clearDndIndicators();

    // Все элементы очереди кроме перетаскиваемого
    const els = [..._dnd.list.querySelectorAll('.c-queue-item:not(.dragging-item)')];
    let insertRef = null; // { el, position }

    for (const el of els) {
        const r   = el.getBoundingClientRect();
        const mid = (r.top + r.bottom) / 2;
        if (e.clientY < mid) {
            // Курсор выше середины → вставить ПЕРЕД этим элементом
            insertRef = { el, position: 'before' };
            el.classList.add('drag-insert-before');
            break;
        }
    }

    if (!insertRef && els.length) {
        // Курсор ниже всех элементов → вставить ПОСЛЕ последнего
        const last = els[els.length - 1];
        insertRef = { el: last, position: 'after' };
        last.classList.add('drag-insert-after');
    }

    _dnd.insertRef = insertRef;
}

function _onDndUp() {
    if (!_dnd) return;
    document.removeEventListener('pointermove', _onDndMove);
    _clearDndIndicators();

    const { id, itemEl, ghost, insertRef } = _dnd;
    _dnd = null;
    ghost.remove();
    itemEl.classList.remove('dragging-item');

    if (insertRef) {
        const targetId = parseInt(insertRef.el.dataset.id);
        if (targetId && targetId !== id) {
            _commitReorder(id, targetId, insertRef.position);
        }
    }
}

function _commitReorder(fromId, toId, position /* 'before' | 'after' */) {
    const fromIdx = buildQueue.findIndex(i => i.id === fromId);
    const toIdx   = buildQueue.findIndex(i => i.id === toId);
    if (fromIdx < 0 || toIdx < 0) return;

    // Если строящийся элемент перемещается — пауза, потом перезапуск
    const needRestart = buildingState && (buildingState.id === fromId || buildingState.id === toId);
    if (needRestart) {
        clearInterval(buildingState.interval);
        buildingState = null;
    }

    // Удаляем перемещаемый элемент
    const [moved] = buildQueue.splice(fromIdx, 1);

    // Находим новый индекс цели (после удаления fromIdx мог сдвинуться)
    const newToIdx = buildQueue.findIndex(i => i.id === toId);

    if (position === 'after') {
        buildQueue.splice(newToIdx + 1, 0, moved);
    } else {
        buildQueue.splice(newToIdx, 0, moved);
    }

    _queueDomIds = [];
    updateQueueUI();
    drawCGrid();

    if (needRestart && isBuildingActive) {
        setTimeout(() => startNextBuild(), 50);
    }
}

function moveQueueItem(id, dir) {
    const idx = buildQueue.findIndex(i => i.id === id);
    if (idx < 0) return;
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= buildQueue.length) return;

    const needRestart = buildingState && (buildingState.id === id || buildingState.id === buildQueue[newIdx].id);
    if (needRestart) {
        clearInterval(buildingState.interval);
        buildingState = null;
    }

    const [item] = buildQueue.splice(idx, 1);
    buildQueue.splice(newIdx, 0, item);
    _queueDomIds = [];
    updateQueueUI();
    drawCGrid();

    if (needRestart && isBuildingActive) {
        setTimeout(() => startNextBuild(), 50);
    }
}

function removeQueueItem(id) {
    const item = buildQueue.find(i=>i.id===id);
    if (!item) return;
    if (buildingState && buildingState.id === id) {
        clearInterval(buildingState.interval);
        buildingState = null;
    }
    buildQueue = buildQueue.filter(i=>i.id!==id);
    updateQueueUI(); drawCGrid();
    if (!buildingState && isBuildingActive) startNextBuild();
}

// ════════════════════════════════════════════════════════
//  BUILD TIMER SYSTEM
// ════════════════════════════════════════════════════════
const BUILD_TIMES = {
    lab:25, air:15, energy:28, workshop:30, extWare:10,
    extEnergy:20, hangar:30, common:12, dining:15, kitchen:13,
    hygiene:12, storage:10, medical:28, farm:22, living:14
};
let buildingState = null;
let isBuildingActive = false;

function finalizeBuild() {
    // Commit ALL uncommitted rooms across ALL floors, not just the current floor
    const uncommitted = buildQueue.filter(i => !i.committed);
    if (!uncommitted.length) return;

    // Exit marking/placement mode
    if (selectedRoomType) {
        selectedRoomType = null;
        refreshRoomList();
        updateSelectedHint();
        updateConstructionPanels();
        drawCGrid();
    }

    // Commit all pending rooms — they join the build pipeline
    uncommitted.forEach(i => { i.committed = true; });

    // Resume time — building has started, time flows normally again
    isPaused = false;
    clearInterval(timeInterval);
    timeInterval = setInterval(updateTime, 1000);
    document.querySelectorAll('.playback-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('playBtn').classList.add('active');

    // Start building if not already running
    if (!isBuildingActive) {
        isBuildingActive = true;
        startNextBuild();
    } else {
        // Already building — just refresh UI so new items show as committed
        _queueDomIds = [];
        updateQueueUI();
    }
}

function startNextBuild() {
    // Build committed items from any floor, in queue order
    const item = buildQueue.find(i => i.committed);
    if (!item) {
        isBuildingActive = false;
        buildingState    = null;
        updateQueueUI();
        return;
    }
    const totalTime      = (BUILD_TIMES[item.roomType] || 20) * 1000;
    const alreadyElapsed = item.progress || 0;
    buildingState = { id: item.id, elapsed: alreadyElapsed, total: totalTime, interval: null };
    buildingState.interval = setInterval(() => {
        buildingState.elapsed += 100;
        item.progress = buildingState.elapsed;
        if (buildingState.elapsed >= buildingState.total) {
            clearInterval(buildingState.interval);
            buildingState = null;
            constructedRooms[item.floor] = constructedRooms[item.floor] || [];
            constructedRooms[item.floor].push(item);
            buildQueue = buildQueue.filter(i => i.id !== item.id);
            drawCGrid();
            renderConstructedRooms();
            startNextBuild();
        } else {
            updateQueueUI();
        }
    }, 100);
    updateQueueUI();
}

// ════════════════════════════════════════════════════════
//  UNIFIED ROOM TILE RENDERER (floor rooms + constructed)
// ════════════════════════════════════════════════════════

function renderConstructedRooms() {
    drawCGrid();
    drawAllRoomsOverlay();
}

function drawConstructedRoomsOverlay() {
    drawAllRoomsOverlay();
}

function drawAllRoomsOverlay() {
    let overlay = document.getElementById('allRoomsOverlay');
    if (!overlay) {
        overlay = document.createElementNS('http://www.w3.org/2000/svg','svg');
        overlay.id = 'allRoomsOverlay';
        overlay.setAttribute('viewBox','0 0 1100 600');
        overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;overflow:visible;';
        document.getElementById('isoGrid').appendChild(overlay);
    }
    overlay.innerHTML = '';

    // Combine floor rooms + constructed rooms
    const floorRooms = (FLOORS[currentFloor]?.rooms || []).map(r => ({
        cells: roomToCells(r),
        color: r.color || '#4a7aaa',
        icon:  r.icon,
        name:  r.name,
        status: r.status,
        isLift: r.isLift,
        _room: r,
        _isFloor: true
    }));
    const builtRooms = (constructedRooms[currentFloor] || []).map(item => {
        const rd = ROOMS_DB[item.roomType] || {};
        return {
            cells: item.cells,
            color: rd.color || '#4a7aaa',
            icon:  rd.icon || '❓',
            name:  rd.name || item.roomType,
            status: 'online',
            isLift: false,
            _isFloor: false,
            _item: item
        };
    });

    [...floorRooms, ...builtRooms].forEach(entry => {
        let minR=99,maxR=0,minC=99,maxC=0;
        entry.cells.forEach(k => {
            const [rr,cc]=k.split(',').map(Number);
            minR=Math.min(minR,rr); maxR=Math.max(maxR,rr);
            minC=Math.min(minC,cc); maxC=Math.max(maxC,cc);
        });
        const x = minC*TILE, y = minR*TILE;
        const w = (maxC-minC+1)*TILE, h = (maxR-minR+1)*TILE;
        const color = entry.color;
        const isSelected = entry._room && entry._room === selectedTileRoom;
        const isLift = entry.isLift;

        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.style.cursor = 'pointer';
        g.style.pointerEvents = 'all';

        // Shadow / glow
        const shadow = document.createElementNS('http://www.w3.org/2000/svg','rect');
        shadow.setAttribute('x', x+3); shadow.setAttribute('y', y+3);
        shadow.setAttribute('width', w-2); shadow.setAttribute('height', h-2);
        shadow.setAttribute('rx','6');
        shadow.setAttribute('fill', '#000');
        shadow.setAttribute('fill-opacity', isLift ? '0.4' : '0.25');
        g.appendChild(shadow);

        // Main bg
        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x', x+1); rect.setAttribute('y', y+1);
        rect.setAttribute('width', w-2); rect.setAttribute('height', h-2);
        rect.setAttribute('rx','6');
        rect.setAttribute('fill', color);
        rect.setAttribute('fill-opacity', isSelected ? '0.55' : (isLift ? '0.38' : '0.28'));
        rect.setAttribute('stroke', color);
        rect.setAttribute('stroke-opacity', isSelected ? '1' : '0.75');
        rect.setAttribute('stroke-width', isSelected ? '2.5' : '1.5');
        g.appendChild(rect);

        // Top shine strip
        const shine = document.createElementNS('http://www.w3.org/2000/svg','rect');
        shine.setAttribute('x', x+2); shine.setAttribute('y', y+2);
        shine.setAttribute('width', w-4); shine.setAttribute('height', Math.min(8, h*0.2));
        shine.setAttribute('rx','5');
        shine.setAttribute('fill','#fff');
        shine.setAttribute('fill-opacity','0.10');
        shine.setAttribute('pointer-events','none');
        g.appendChild(shine);

        // Lift animated border
        if (isLift) {
            const liftRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
            liftRect.setAttribute('x', x+1); liftRect.setAttribute('y', y+1);
            liftRect.setAttribute('width', w-2); liftRect.setAttribute('height', h-2);
            liftRect.setAttribute('rx','6');
            liftRect.setAttribute('fill','none');
            liftRect.setAttribute('stroke','#6a9adf');
            liftRect.setAttribute('stroke-opacity','0.5');
            liftRect.setAttribute('stroke-width','1');
            liftRect.setAttribute('stroke-dasharray','6 4');
            liftRect.setAttribute('pointer-events','none');
            g.appendChild(liftRect);
        }

        // Selection glow
        if (isSelected) {
            const glow = document.createElementNS('http://www.w3.org/2000/svg','rect');
            glow.setAttribute('x', x-2); glow.setAttribute('y', y-2);
            glow.setAttribute('width', w+4); glow.setAttribute('height', h+4);
            glow.setAttribute('rx','8');
            glow.setAttribute('fill','none');
            glow.setAttribute('stroke', color);
            glow.setAttribute('stroke-opacity','0.5');
            glow.setAttribute('stroke-width','3');
            glow.setAttribute('filter','url(#roomGlow)');
            glow.setAttribute('pointer-events','none');
            g.insertBefore(glow, g.firstChild);
        }

        // Icon
        const icon = document.createElementNS('http://www.w3.org/2000/svg','text');
        icon.setAttribute('x', x + w/2);
        icon.setAttribute('y', y + h/2 - (h > 60 ? 10 : 0));
        icon.setAttribute('text-anchor','middle');
        icon.setAttribute('dominant-baseline','central');
        icon.setAttribute('font-size', Math.min(32, Math.min(w,h)*0.42));
        icon.setAttribute('pointer-events','none');
        icon.textContent = entry.icon;
        g.appendChild(icon);

        // Name label (only if room tall enough)
        if (h >= 60) {
            const label = document.createElementNS('http://www.w3.org/2000/svg','text');
            label.setAttribute('x', x + w/2);
            label.setAttribute('y', y + h/2 + Math.min(20, h*0.28));
            label.setAttribute('text-anchor','middle');
            label.setAttribute('dominant-baseline','central');
            label.setAttribute('font-size', Math.min(11, w/7+4));
            label.setAttribute('fill', isLift ? '#6a9adf' : '#dde');
            label.setAttribute('font-weight','600');
            label.setAttribute('pointer-events','none');
            // Truncate if too narrow
            const maxChars = Math.floor(w / 7);
            const txt = entry.name.length > maxChars ? entry.name.slice(0, maxChars-1)+'…' : entry.name;
            label.textContent = txt;
            g.appendChild(label);
        }

        // Status dot (top-right corner)
        if (entry.status) {
            const dotColor = entry.status==='online'?'#4ade80': entry.status==='warning'?'#fbbf24':'#ef4444';
            const dotR = 5;
            const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
            dot.setAttribute('cx', x+w-dotR-4); dot.setAttribute('cy', y+dotR+4);
            dot.setAttribute('r', dotR);
            dot.setAttribute('fill', dotColor);
            dot.setAttribute('pointer-events','none');
            g.appendChild(dot);
        }

        // Lift pulse ring
        if (isLift) {
            const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
            ring.setAttribute('cx', x+w-10); ring.setAttribute('cy', y+10);
            ring.setAttribute('r','8');
            ring.setAttribute('fill','rgba(106,154,223,0.2)');
            ring.setAttribute('stroke','#6a9adf');
            ring.setAttribute('stroke-opacity','0.4');
            ring.setAttribute('stroke-width','1');
            ring.setAttribute('pointer-events','none');
            const anim = document.createElementNS('http://www.w3.org/2000/svg','animate');
            anim.setAttribute('attributeName','r'); anim.setAttribute('values','5;12;5');
            anim.setAttribute('dur','2s'); anim.setAttribute('repeatCount','indefinite');
            ring.appendChild(anim);
            const anim2 = document.createElementNS('http://www.w3.org/2000/svg','animate');
            anim2.setAttribute('attributeName','opacity'); anim2.setAttribute('values','0.6;0;0.6');
            anim2.setAttribute('dur','2s'); anim2.setAttribute('repeatCount','indefinite');
            ring.appendChild(anim2);
            g.appendChild(ring);
        }

        // Click handler — floor rooms open their panel, built rooms open a built-room panel
        if (entry._isFloor) {
            g.style.pointerEvents = 'all';
            g.addEventListener('click', e => { e.stopPropagation(); selectRoom(entry._room); });
        } else if (entry._item) {
            g.style.pointerEvents = 'all';
            g.addEventListener('click', e => { e.stopPropagation(); openBuiltRoomPanel(entry._item); });
        }

        overlay.appendChild(g);
    });
}

// Call on floor switch to refresh overlay
const _origRenderFloor = renderFloor;

// ════════════════════════════════════════════════════════
//  ROOM TYPE SELECTION PANEL
// ════════════════════════════════════════════════════════
function buildRoomListPanel() {
    hideRoomTooltip();   // сбрасываем тултип при любой пересборке панели
    const panel = document.getElementById('cBottomPanel');
    panel.innerHTML = Object.entries(ROOMS_DB).map(([k,v]) => {
        const fx = [];
        if (v.oxygen)   fx.push(`O₂ ${v.oxygen>0?'+':''}${v.oxygen}%`);
        if (v.heat)     fx.push(`T ${v.heat>0?'+':''}${v.heat}°`);
        if (v.humidity) fx.push(`💧${v.humidity>0?'+':''}${v.humidity}%`);
        if (v.noise)    fx.push(`🔇${v.noise}дБ`);
        if (v.energy)   fx.push(`⚡+${v.energy}`);
        const fxJson = JSON.stringify(fx).replace(/"/g,'&quot;');
        return `<button class="c-room-btn ${selectedRoomType===k?'selected':''}"
            onclick="selectRoomType('${k}')"
            data-room-key="${k}"
            data-tt-name="${v.name}"
            data-tt-desc="${v.desc.replace(/"/g,'&quot;')}"
            data-tt-cost="${v.cost}"
            data-tt-fx="${fxJson}"
        >${v.icon}</button>`;
    }).join('');

    panel.querySelectorAll('.c-room-btn').forEach(btn => {
        btn.addEventListener('mouseenter', showRoomTooltip);
        btn.addEventListener('mouseleave', hideRoomTooltip);
    });

    panel.addEventListener('scroll', hideRoomTooltip, { passive: true });

    updateSelectedHint();
}

// ════════════════════════════════════════════════════════
//  FLOATING ROOM TOOLTIP  (fixed-position, never clipped)
// ════════════════════════════════════════════════════════

function showRoomTooltip(e) {
    const btn = e.currentTarget;
    const tt  = document.getElementById('roomFloatTooltip');

    const name = btn.dataset.ttName;
    const desc = btn.dataset.ttDesc;
    const cost = btn.dataset.ttCost;
    let   fx   = [];
    try { fx = JSON.parse(btn.dataset.ttFx || '[]'); } catch(_) {}

    const fxHtml = fx.map(f => `<span class="tt-fx-tag">${f}</span>`).join('');
    tt.innerHTML = `
        <div class="tt-name">${name}</div>
        <div class="tt-desc">${desc}</div>
        <div class="tt-divider"></div>
        <div class="tt-cost">${cost} металла за тайл</div>
        ${fxHtml ? `<div class="tt-effects">${fxHtml}</div>` : ''}
    `;

    positionRoomTooltip(btn);
    tt.classList.add('visible');
}

function positionRoomTooltip(btn) {
    const tt   = document.getElementById('roomFloatTooltip');
    const rect = btn.getBoundingClientRect();
    const margin = 8;

    // Measure without transition interference (tooltip is opacity:0 but in flow)
    const ttW = tt.offsetWidth  || 210;
    const ttH = tt.offsetHeight || 100;

    let left = rect.left + rect.width / 2 - ttW / 2;

    // Prefer above; flip below if not enough room
    const spaceAbove = rect.top - margin;
    const flipped = spaceAbove < ttH + 10;
    let top = flipped ? rect.bottom + 10 : rect.top - ttH - 10;

    left = Math.max(margin, Math.min(left, window.innerWidth  - ttW - margin));
    top  = Math.max(margin, Math.min(top,  window.innerHeight - ttH - margin));

    tt.style.left = left + 'px';
    tt.style.top  = top  + 'px';
    tt.classList.toggle('flipped', flipped);

    const arrowLeft    = (rect.left + rect.width / 2) - left;
    const clampedArrow = Math.max(16, Math.min(arrowLeft, ttW - 16));
    tt.style.setProperty('--arrow-left', clampedArrow + 'px');
}

function hideRoomTooltip() {
    document.getElementById('roomFloatTooltip').classList.remove('visible');
}

function updateSelectedHint() {
    const hint    = document.getElementById('cSelectedHint');
    const cancelBtn = document.getElementById('cCancelSelBtn');
    if (!hint) return;
    if (selectedRoomType && isConstruction) {
        const v = ROOMS_DB[selectedRoomType];
        hint.innerHTML = `<span class="hint-mode-icon">🔨</span><span>${v.icon} <strong style="color:#fff">${v.name}</strong> &nbsp;·&nbsp; ЛКМ: разметить &nbsp;·&nbsp; ПКМ: удалить &nbsp;·&nbsp; ПКМ на пустом — снять выбор &nbsp;</span>`;
        hint.classList.add('visible');
        if (cancelBtn) cancelBtn.classList.add('visible');
        // Set hammer cursor on grid
        const svg = document.getElementById('constructionGridSvg');
        if (svg) svg.classList.add('placement-mode');
    } else {
        hint.classList.remove('visible');
        hint.innerHTML = '';
        if (cancelBtn) cancelBtn.classList.remove('visible');
        // Remove hammer cursor
        const svg = document.getElementById('constructionGridSvg');
        if (svg) svg.classList.remove('placement-mode', 'erasing');
    }
}

function selectRoomType(type) {
    hideRoomTooltip();
    // Clicking the already-selected type deselects it
    if (selectedRoomType === type) {
        cancelRoomSelection();
        return;
    }
    selectedRoomType = type;
    refreshRoomList();
    updateSelectedHint();
    updateConstructionPanels();   // <-- newly added
    drawCGrid();
}

function cancelRoomSelection() {
    hideRoomTooltip();
    selectedRoomType = null;
    refreshRoomList();
    updateSelectedHint();
    updateConstructionPanels();
    drawCGrid();
}

// Fix 2: RMB anywhere outside the grid also deselects selected room
document.addEventListener('mousedown', e => {
    if (!isConstruction || e.button !== 2) return;
    const svg = document.getElementById('constructionGridSvg');
    if (svg && svg.contains(e.target)) return; // handled by onCellDown
    if (selectedRoomType) {
        cancelRoomSelection();
    }
});

function refreshRoomList() {
    buildRoomListPanel();
}

// ════════════════════════════════════════════════════════
//  TOP / SUB TAB EVENTS
// ════════════════════════════════════════════════════════
document.querySelectorAll('.main-tab').forEach(t => {
    t.addEventListener('click', function() {
        document.querySelectorAll('.main-tab').forEach(x=>x.classList.remove('active'));
        this.classList.add('active');
    });
});
document.querySelectorAll('.layer-btn').forEach(b => {
    b.addEventListener('click', function() {
        document.querySelectorAll('.layer-btn').forEach(x=>x.classList.remove('active'));
        this.classList.add('active');
    });
});

document.getElementById('levelUp').onclick   = () => { if (currentFloor<3) switchFloor(currentFloor+1); };
document.getElementById('levelDown').onclick = () => { if (currentFloor>1) switchFloor(currentFloor-1); };
document.getElementById('cLevelUp').onclick  = () => { if (currentFloor<3) switchFloor(currentFloor+1); };
document.getElementById('cLevelDown').onclick= () => { if (currentFloor>1) switchFloor(currentFloor-1); };

document.getElementById('isoGrid').addEventListener('click', e => {
    if (!isConstruction && (e.target===e.currentTarget || e.target.id==='roomsContainer' || e.target.id==='allRoomsOverlay'))
        closePanel();
});

// ════════════════════════════════════════════════════════
//  TIME CONTROLS
// ════════════════════════════════════════════════════════
function updateTime() {
    if (isPaused) return;
    currentTime.minutes++;
    if (currentTime.minutes>=60) { currentTime.minutes=0; currentTime.hours=(currentTime.hours+1)%24; }
    document.getElementById('timeDisplay').textContent =
        String(currentTime.hours).padStart(2,'0')+':'+String(currentTime.minutes).padStart(2,'0');
}
document.getElementById('pauseBtn').onclick = function() {
    isPaused=true; clearInterval(timeInterval);
    document.querySelectorAll('.playback-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
};
document.getElementById('playBtn').onclick = function() {
    isPaused=false; clearInterval(timeInterval); timeInterval=setInterval(updateTime,1000);
    document.querySelectorAll('.playback-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
};
document.getElementById('fastBtn').onclick = function() {
    isPaused=false; clearInterval(timeInterval); timeInterval=setInterval(updateTime,200);
    document.querySelectorAll('.playback-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
};

// ── INIT ──
renderFloor(1);
</script>
