<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Management – Construction Grid v3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #e0e0e0; overflow: hidden; height: 100vh; user-select: none; display: flex; flex-direction: column; }

/* ── Top Bar ── */
.top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px 0; background: #0f1419; border-bottom: 2px solid #2a3f5f; height: 88px; }
.nav-group { display: flex; align-items: center; background: #1a2030; border-radius: 8px; border: 1px solid #2a3f5f; padding-left: 24px;padding-right: 24px; }
.main-tab { padding: 8px 16px; background: transparent; border: none; color: #667; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: all 0.2s; border-radius: 4px; white-space: nowrap; }
.main-tab:hover { background: #2a3550; color: #fff; }
.main-tab.active { background: #3a5f8f; color: #fff; box-shadow: 0 0 8px rgba(58,95,143,0.4); }
.level-selector { display: flex; flex-direction: column; width: 40px; margin: 0 4px; border: 1px solid #2a3f5f; border-radius: 4px; overflow: hidden; background: #1a2535; }
.level-arrow { height: 16px; background: #2a3040; border: none; color: #556; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all 0.2s; }
.level-arrow:hover:not(:disabled) { background: #3a5f8f; color: #fff; }
.level-arrow:disabled { opacity: 0.3; cursor: not-allowed; } 
.level-number { background: #3a5f8f; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; padding: 2px 0; }
.time-group { display: flex; align-items: center; gap: 4px; margin-left: 4px; padding-left: 8px; border-left: 1px solid #2a3f5f; }
.time-display { font-family: 'Courier New', monospace; font-size: 16px; color: #6a9adf; font-weight: bold; letter-spacing: 1px; background: #1a2535; padding: 6px 10px; border: 1px solid #2a3f5f; border-radius: 4px; }
.playback-controls { display: flex; gap: 2px; }
.playback-btn { width: 30px; height: 30px; background: #2a3040; border: 1px solid #2a3f5f; color: #667; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 4px; transition: all 0.2s; }
.playback-btn:hover { background: #3a4560; color: #fff; }
.playback-btn.active { background: #3a5f8f; border-color: #4a7fbf; color: #fff; }

.sub-tabs-bar { display: flex; justify-content: center; padding: 8px 0; background: #0f141c; border-bottom: 1px solid #1a2035; }
.sub-tabs-row { display: flex; align-items: center; gap: 4px; background: #1a2030; border-radius: 6px; border: 1px solid #2a3f5f; padding: 4px; }
.sub-sep { width: 1px; height: 24px; background: #2a3f5f; margin: 0 4px; }

/* ── Main Canvas ── */
.main-canvas { position: relative; flex: 1; min-height: 0; background: radial-gradient(ellipse at center, #161d2a 0%, #0d1117 100%); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.iso-grid { position: relative; width: 1100px; height: 600px; transition: opacity 0.4s ease, transform 0.4s ease; }

/* ── Iso Blocks ── */
.iso-block { position: absolute; cursor: pointer; transition: all 0.3s; z-index: 2; }
.iso-block:hover { transform: scale(1.05); filter: brightness(1.15); }
.iso-block.selected { filter: brightness(1.25); }
.iso-block.is-lift .block-svg { filter: drop-shadow(0 0 15px rgba(106,154,223,0.3)); }
.block-svg { width: 180px; height: 150px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3)); }
.block-top  { fill: #4a7aaa; stroke: #3a6a9a; stroke-width: 1.5; }
.block-front{ fill: #3a6a9a; stroke: #2a5a8a; stroke-width: 1.5; }
.block-side { fill: #2a5a8a; stroke: #1a4a7a; stroke-width: 1.5; }
.block-edge { fill: #1a4a7a; stroke: #0a3a6a; stroke-width: 1; }
.block-icon  { font-size: 32px; text-anchor: middle; dominant-baseline: central; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
.block-label { font-size: 12px; fill: #fff; text-anchor: middle; dominant-baseline: central; font-weight: 600; }
.block-label.lift-label { font-size: 10px; font-weight: 700; fill: #6a9adf; }
.status-dot { position: absolute; top: 10px; right: 20px; width: 8px; height: 8px; border-radius: 50%; z-index: 3; }
.status-dot.online  { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
.status-dot.warning { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
.status-dot.offline { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
.lift-pulse { position: absolute; top: 8px; right: 16px; width: 14px; height: 14px; border-radius: 50%; background: rgba(106,154,223,0.3); animation: liftPulse 2s infinite; z-index: 2; }
@keyframes liftPulse { 0%,100% { opacity:0.3; transform:scale(1); } 50% { opacity:0; transform:scale(2); } }
.corridors-svg { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 1; }
.corridor-line { stroke: #3a5f7f; stroke-width: 4; fill: none; stroke-linecap: round; stroke-dasharray: 6 3; opacity: 0.6; }

/* ── Detail Panel ── */
.detail-panel { position: absolute; left: 20px; bottom: 150px; width: 300px; background: rgba(15,20,25,0.97); border: 1px solid #2a3f5f; border-radius: 12px; z-index: 20; display: none; backdrop-filter: blur(10px); overflow: hidden; }
.detail-panel.visible { display: block; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
.panel-header { background: linear-gradient(135deg, #1a2535 0%, #0f1419 100%); padding: 16px 20px; border-bottom: 1px solid #2a3f5f; display: flex; align-items: center; justify-content: space-between; }
.panel-header-left { display: flex; align-items: center; gap: 10px; }
.panel-icon { font-size: 28px; }
.panel-title { font-size: 16px; font-weight: 600; color: #6a9adf; }
.panel-subtitle { font-size: 11px; color: #556; margin-top: 2px; }
.panel-close { width:28px; height:28px; background:transparent; border:1px solid #2a3f5f; color:#667; cursor:pointer; border-radius:6px; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.panel-close:hover { background:#2a3550; color:#fff; }
.panel-body { padding: 16px 20px; overflow-y: auto; max-height: 300px; }
.panel-section { margin-bottom: 16px; }
.panel-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #556; margin-bottom: 10px; }
.panel-stats { display: flex; flex-direction: column; gap: 6px; }
.panel-stat { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 0; }
.panel-stat .label { color: #889; }
.panel-stat .value { color: #6a9adf; font-weight: 600; }
.floor-list { display: flex; flex-direction: column; gap: 6px; }
.floor-option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1a2030; border: 1px solid #2a3f5f; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.floor-option:hover:not(.current) { background: #2a3550; border-color: #3a5f8f; transform: translateX(4px); }
.floor-option.current { background: #1a2535; border-color: #3a5f8f; cursor: default; opacity: 0.7; }
.floor-option .floor-num { width:36px; height:36px; background:#2a3550; border:1px solid #3a5f8f; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:#6a9adf; flex-shrink:0; }
.floor-option.current .floor-num { background: #3a5f8f; color: #fff; }
.floor-option .floor-info { flex: 1; }
.floor-option .floor-name { font-size: 14px; font-weight: 600; color: #e0e0e0; }
.floor-option .floor-desc { font-size: 11px; color: #667; margin-top: 2px; }
.floor-option .floor-badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
.floor-option.current .floor-badge { background: rgba(74,222,128,0.15); color: #4ade80; }
.floor-option .floor-arrow { font-size: 16px; color: #3a5f8f; transition: all 0.2s; }
.floor-option:hover:not(.current) .floor-arrow { color: #6a9adf; transform: translateX(3px); }
.panel-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #2a3f5f; }
.panel-btn { flex:1; padding:8px; background:#1a2535; border:1px solid #2a3f5f; color:#889; cursor:pointer; border-radius:6px; font-size:12px; transition:all 0.2s; }
.panel-btn:hover { background: #2a3550; color: #fff; border-color: #3a5f8f; }
.panel-btn.primary { background: #2a4f7f; color: #fff; border-color: #3a6faf; }

/* ── Floor Transition ── */
.floor-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(10,14,20,0.92); z-index:30; display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; backdrop-filter:blur(4px); }
.floor-overlay.active { display: flex; }
.transition-icon { font-size: 48px; animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-12px); } }
.transition-text { font-size: 16px; color: #6a9adf; font-weight: 600; letter-spacing: 1px; }

/* ── Layer buttons (now in sub-tabs bar) ── */
.bottom-layers { display:flex; gap:6px; padding:0; background: transparent; z-index:10; }

.layer-btn { width:36px; height:36px; background:#1a2535; border:1px solid #2a3f5f; color:#556; cursor:pointer; border-radius:6px; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; position:relative; }
.layer-btn:hover { background: #2a3550; color: #fff; }
.layer-btn.active { background: #2a4f7f; border-color: #3a6faf; color: #fff; box-shadow: 0 0 8px rgba(42,79,127,0.3); }
.layer-tooltip { position:absolute; top:110%; left:50%; transform:translateX(-50%); background:#0f1419; color:#fff; padding:4px 10px; border-radius:4px; font-size:11px; white-space:nowrap; border:1px solid #3a5f8f; display:none; }
.layer-btn:hover .layer-tooltip { display: block; }

/* ══════════════════════════════════════
   CONSTRUCTION SYSTEM
══════════════════════════════════════ */

/* Construction SVG grid overlay */
#constructionGridSvg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
    display: none;
}
#constructionGridSvg.active {
    pointer-events: auto;
    display: block;
}

/* Grid cell states */
.gc-bg     { fill: #0e1824; }
.gc-neutral { fill: rgba(30,60,100,0.15); stroke: rgba(100,160,220,0.25); stroke-width: 0.8; }
.gc-free    { fill: rgba(0,220,100,0.13); stroke: rgba(0,200,80,0.5); stroke-width: 1; animation: pulseGreen 2s infinite; }
.gc-blocked { fill: rgba(240,60,60,0.28); stroke: rgba(220,60,60,0.7); stroke-width: 1; }
.gc-queue   { fill: rgba(255,170,0,0.28); stroke: rgba(255,170,0,0.8); stroke-width: 1.2; stroke-dasharray: 4 2; }
.gc-queue-other { fill: rgba(160,50,50,0.45); stroke: rgba(180,60,60,0.8); stroke-width: 1; }
.gc-preview-add { fill: rgba(0,220,100,0.38); stroke: rgba(0,255,100,0.9); stroke-width: 1.5; }
.gc-preview-bad { fill: rgba(255,40,40,0.30); stroke: rgba(255,40,40,0.8); stroke-width: 1.5; }
.gc-preview-del { fill: rgba(255,80,0,0.35); stroke: rgba(255,120,0,0.9); stroke-width: 1.5; stroke-dasharray: 4 2; }
@keyframes pulseGreen { 0%,100%{fill:rgba(0,220,100,0.10);} 50%{fill:rgba(0,220,100,0.22);} }

.gc-room-icon { font-size: 26px; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.gc-room-icon.active   { filter: drop-shadow(0 0 5px rgba(255,170,0,0.8)); fill: #ffee88; }
.gc-room-icon.inactive { filter: drop-shadow(0 0 5px rgba(200,60,60,0.7)); fill: #ff9999; }

/* Drag dimensions hint */
.drag-hint { position:absolute; background:rgba(0,0,0,0.75); color:#0f0; font-family:monospace; font-size:13px; padding:4px 10px; border-radius:4px; pointer-events:none; z-index:40; display:none; white-space:nowrap; }

/* ── Bottom room panel (icon-only square buttons) ── */
.c-panel-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #5577aa; padding: 12px 14px 8px; border-bottom: 1px solid #1e2d40; flex-shrink: 0; }
.c-bottom-panel {
    position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%);
    display: none; align-items: center; gap: 4px;
    background: rgba(10,14,22,0.95); border: 1px solid #2a3f5f; border-radius: 10px;
    padding: 6px 10px; z-index: 15; backdrop-filter: blur(8px);
    flex-wrap: nowrap; max-width: calc(100% - 40px); overflow-x: auto;
}
.c-bottom-panel.visible { display: flex; }
.c-room-btn {
    width: 44px; height: 44px; border-radius: 6px; border: 1px solid #1e2d40;
    background: #0c1018; cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; position: relative; flex-shrink: 0;
}
.c-room-btn:hover { border-color: #3a6faf; background: #111926; }
.c-room-btn.selected { border-color: #00e5ff; background: #0c1a26; box-shadow: 0 0 8px rgba(0,229,255,0.3); }
/* X overlay on hover for selected button — shows the player they can click to deselect */
.c-room-btn.selected:hover::after {
    content: '✕';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(220,30,50,0.82); border-radius: 5px;
    display: block; text-align: center; line-height: 44px;
    font-size: 16px; color: #fff; font-weight: bold; z-index: 2;
}
/* ── Floating room tooltip (rendered at body level, never clipped) ── */
#roomFloatTooltip {
    position: fixed;
    background: #080f1a; border: 1px solid #3a6faf; border-radius: 8px;
    padding: 10px 13px; font-size: 11px; color: #cce;
    pointer-events: none; /* never intercepts mouse — show/hide is purely driven by the button */
    z-index: 9999;
    display: flex; flex-direction: column; gap: 4px; min-width: 190px; max-width: 230px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,229,255,0.08);
    opacity: 0; visibility: hidden;
    transition: opacity 0.12s ease, visibility 0.12s;
}
#roomFloatTooltip.visible { opacity: 1; visibility: visible; }
/* Arrow — points DOWN toward button (default); flipped class points UP */
#roomFloatTooltip::after {
    content: ''; position: absolute; top: 100%; left: var(--arrow-left, 50%);
    transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #3a6faf;
}
#roomFloatTooltip.flipped::after {
    top: auto; bottom: 100%;
    border-top-color: transparent; border-bottom-color: #3a6faf;
}
#roomFloatTooltip .tt-name { font-weight: 700; color: #eef; font-size: 13px; letter-spacing: 0.3px; }
#roomFloatTooltip .tt-desc { color: #8899bb; font-size: 10px; line-height: 1.5; white-space: normal; margin: 1px 0; }
#roomFloatTooltip .tt-divider { height: 1px; background: #1e2d40; margin: 3px 0; }
#roomFloatTooltip .tt-cost { color: #ffcc55; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
#roomFloatTooltip .tt-cost::before { content: '🔩'; font-size: 12px; }
#roomFloatTooltip .tt-effects { color: #5a9aaf; font-size: 10px; margin-top: 2px; line-height: 1.6; display: flex; flex-wrap: wrap; gap: 4px; }
#roomFloatTooltip .tt-fx-tag { background: rgba(58,95,143,0.3); border: 1px solid #2a4060; border-radius: 3px; padding: 1px 5px; color: #7abcdf; font-size: 9px; }

/* ── Hammer cursor when placement mode active ── */
#constructionGridSvg.placement-mode {
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><text y='30' font-size='28'>🔨</text></svg>") 6 30, crosshair;
}
#constructionGridSvg.placement-mode.erasing {
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><text y='30' font-size='28'>🧹</text></svg>") 6 30, crosshair;
}

/* ── Placement mode grid glow border ── */
#constructionGridSvg.placement-mode {
    outline: none;
    filter: drop-shadow(0 0 6px rgba(0,229,255,0.25));
}

/* ── Selected hint upgrade ── */
.c-selected-hint {
    position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%);
    background: rgba(5,10,18,0.95); border: 1px solid #00e5ff; border-radius: 8px;
    padding: 7px 16px; font-size: 12px; color: #7adfff; z-index: 16;
    display: none; white-space: nowrap; backdrop-filter: blur(6px);
    pointer-events: none; box-shadow: 0 0 16px rgba(0,229,255,0.15);
    animation: hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse {
    0%, 100% { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.15); }
    50%       { border-color: #40ffff; box-shadow: 0 0 20px rgba(0,229,255,0.35); }
}
.c-selected-hint.visible { display: flex; align-items: center; gap: 8px; }
.c-selected-hint .hint-mode-icon { font-size: 16px; }
/* .c-selected-hint is defined above with enhanced styles */

/* ── Right panel (queue) ── */
.c-right-panel {
    position: absolute; right: 10px; top: 112px; width: 280px;
    background: rgba(10,14,22,0.97); border: 1px solid #2a3f5f; border-radius: 10px;
    display: none; flex-direction: column; z-index: 15; backdrop-filter: blur(8px);
    overflow: hidden; max-height: calc(100% - 20px);
}
.c-right-panel.visible { display: flex; }
.c-queue-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.c-queue-item { background: #0c1018; border: 1px solid #2a3040; border-left: 3px solid #ffaa33; border-radius: 6px; padding: 10px 10px 10px 32px; font-size: 13px; position: relative; transition: opacity 0.2s; user-select: none; }
.c-queue-item.dragging-item { opacity: 0.3; }
.c-queue-item.drag-insert-before { box-shadow: 0 -3px 0 0 #00e5ff; }
.c-queue-item.drag-insert-after  { box-shadow: 0  3px 0 0 #00e5ff; }
.c-queue-item.building { border-left-color: #00e5ff; }

/* ── Batch divider ── */
.c-queue-batch-divider {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: #ffaa33; padding: 2px 4px; flex-shrink: 0;
}
.c-queue-batch-divider::before,
.c-queue-batch-divider::after {
    content: ''; flex: 1; height: 1px; background: #ffaa3355;
}

/* ── Build btn new-batch state ── */
.c-build-btn.new-batch {
    background: linear-gradient(135deg, #ffaa33, #cc7700);
    color: #000;
}
.c-build-btn.new-batch:hover { filter: brightness(1.12); }
.c-queue-drag-handle { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#44445E; font-size:14px; cursor:grab; line-height:1; padding:4px 2px; border-radius:3px; transition:color .15s; }
.c-queue-drag-handle:hover { color:#6a9adf; background:rgba(106,154,223,0.1); }
.c-queue-drag-handle:active { cursor:grabbing; }
.c-queue-item-name { font-weight: 700; color: #dde; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; padding-right: 22px; font-size: 15px; }
.c-queue-item-meta { font-size: 12px; color: #556; }
.c-queue-timer { font-size: 12px; color: #00e5ff; margin-top: 4px; }
.c-queue-cancel { position:absolute; top:7px; right:8px; width:20px; height:20px; border-radius:50%; border:none; background:#2a3040; color:#889; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; transition:all .18s; }
.c-queue-cancel:hover { background: #ff4455; color: #fff; }
.c-queue-empty { text-align:center; color:#446; padding:20px 10px; font-size:12px; }
.c-queue-progress { height: 3px; background: #1a2a3a; border-radius: 2px; margin-top: 5px; overflow: hidden; }
.c-queue-progress-bar { height: 100%; background: linear-gradient(90deg, #00e5ff, #0088cc); border-radius: 2px; transition: width 0.4s linear; }
.c-queue-total { padding: 10px 14px; border-top: 1px solid #1e2d40; font-size: 13px; background: #0c1018; flex-shrink: 0; }
.c-queue-total-line { display:flex; justify-content:space-between; margin-bottom:4px; }
.c-queue-total-line.bold { font-weight:700; color:#00e5ff; border-top:1px solid #1e2d40; padding-top:6px; margin-top:4px; }
.c-build-btn { margin:10px; padding:13px; border-radius:6px; border:none; background:linear-gradient(135deg,#00e5ff,#0088cc); color:#000; font-weight:700; cursor:pointer; font-size:14px; flex-shrink:0; }
.c-build-btn:hover { filter: brightness(1.12); }
.c-build-btn:disabled { background:#333; color:#666; cursor:not-allowed; }

/* ── Instructions ── */
.c-instructions {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(5,10,18,0.92); border: 1px solid #2a4060; border-radius: 8px;
    padding: 8px 8px; font-size: 12px; color: #7a9abb; z-index: -1;
    display: none; white-space: nowrap; backdrop-filter: blur(6px);
}
.c-instructions.visible { display: block; }

/* ── Close button ── */
.c-close-btn {
    position: absolute; top: 10px; right: 10px;
    width: 32px; height: 32px; background: #1a2535; border: 1px solid #3a5f8f;
    color: #e0e4e8; cursor: pointer; border-radius: 6px; font-size: 16px;

    border-radius: 14px;
    color: #c8e4ff;
    cursor: pointer;
    display: flex; flex-direction: row;
    align-items: center; justify-content: center;
    gap: 5px;
    z-index: 10;

                inset 0 1px 0 rgba(255,255,255,0.08);
    transition: all 0.2s ease;
    letter-spacing: 0.6px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.build-fab-btn:hover {
    background: linear-gradient(145deg, #254f7f 0%, #2a6faf 50%, #3a8fcf 100%);
    border-color: #5aafef;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(58,127,191,0.5),
                inset 0 1px 0 rgba(255,255,255,0.12);
    transform: translateY(-2px);
    color: #e8f4ff;
}

.build-fab-btn .fab-icon { font-size: 36px; line-height: 1; }
.build-fab-btn .fab-label { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.2; opacity: 0.9; }
.build-fab-btn.hidden { display: none; }

/* ── Marking status queue item ── */
.c-queue-item.marking {
    border-left-color: #00ff88;
    border-color: rgba(0,255,136,0.5);
    border-style: dashed;
    background: rgba(0,40,20,0.6);
    animation: markingPulse 1.2s ease-in-out infinite;
}
@keyframes markingPulse {
    0%, 100% { border-color: rgba(0,255,136,0.5); box-shadow: 0 0 8px rgba(0,255,136,0.15); }
    50%       { border-color: rgba(0,255,136,0.9); box-shadow: 0 0 16px rgba(0,255,136,0.35); }
}
.c-queue-item-marking-label { font-size: 11px; color: #00ff88; margin-top: 4px; display: flex; align-items: center; gap: 5px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a3f5f; border-radius: 3px; }

/* ── Construction-mode floor switcher (left side, mirrors queue on right) ── */
.c-floor-switcher {
    position: absolute; left: 10px; top: 112px;

    padding: 8px 0; gap: 4px;
}
.c-floor-switcher.visible { display: flex; }
.c-floor-switcher .c-fs-title {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
    color: #5577aa; text-align: center; padding: 4px 4px 6px;
    border-bottom: 1px solid #1e2d40; width: 100%; margin-bottom: 4px;
}
.c-floor-switcher .level-arrow {
    width: 28px; height: 24px; background: #2a3040; border: 1px solid #2a3f5f;
    color: #556; cursor: pointer; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; transition: all 0.2s;
}
.c-floor-switcher .level-arrow:hover:not(:disabled) { background: #3a5f8f; color: #fff; }
.c-floor-switcher .level-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.c-floor-switcher .c-fs-num {
    background: #3a5f8f; color: #fff; border-radius: 6px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: bold;
}

/* ── Cancel-selection round button — HIDDEN (deselect by clicking same room icon) ── */
.c-cancel-sel-btn { display: none !important; }

/* ── Queue order control (arrows + drag handle column) ── */
.c-queue-order-ctrl {
    position: absolute; left: -3px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.c-queue-order-btn {
    width: 24px; height: 16px; background: transparent; border: none;
    color: #3a4a60; cursor: pointer; font-size: 12px; line-height: 1;

    border-radius: 3px; padding: 0; transition: color .15s, background .15s;

.c-queue-order-btn:hover { color: #6a9adf; background: rgba(106,154,223,0.12); }
.c-queue-order-btn:disabled { color: #3b3c53; cursor: default; }

/* ── Queue item status badge ── */

.c-queue-status.s-marked  { background: rgba(0,255,100,0.12); color: #00cc66; border: 1px solid rgba(0,200,80,0.25); }
.c-queue-status.s-building { background: rgba(0,229,255,0.12); color: #00e5ff; border: 1px solid rgba(0,200,230,0.25); }

.c-queue-floor-link {

// ════════════════════════════════════════════════════════
let currentFloor = 1;
let isPaused = true;
let currentTime = { hours: 20, minutes: 10 };
let timeInterval = null;
let isTransitioning = false;

// Construction
const TILE = 40;
const GCOLS = Math.floor(1100 / TILE);  // 27
const GROWS = Math.floor(600  / TILE);  // 15
let isConstruction = false;
let selectedRoomType = null;
let buildQueue = [];                 // [{id, floor, roomType, cells:Set}]
let constructedRooms = {1:[],2:[],3:[]};
let selectedTileRoom = null;

// Drag state
let isDragging     = false;   // LMB
let isRightDrag    = false;   // RMB
let dragA = null, dragB = null;       // LMB start/end {r,c}
let rdragA = null, rdragB = null;     // RMB start/end
let dragMoved = false;                // whether mouse moved during drag
let previewQueueItem = null;          // temporary "разметка" item shown while dragging

// ════════════════════════════════════════════════════════
//  ISO FLOOR RENDER
// ════════════════════════════════════════════════════════
function roomToCells(room) {
    const s = new Set();
    for (let r = room.row; r < room.row + room.h; r++)
        for (let c = room.col; c < room.col + room.w; c++)
            s.add(`${r},${c}`);
    return s;
}

function renderFloor(n) {
    const fl = FLOORS[n];
    const cont = document.getElementById('roomsContainer');
    const svg  = document.getElementById('corridorsSvg');
    cont.innerHTML = ''; svg.innerHTML = '';
    // No more iso blocks — all rooms rendered via tile overlay
    setTimeout(() => drawAllRoomsOverlay(), 0);
}

// ════════════════════════════════════════════════════════
//  PANELS
// ════════════════════════════════════════════════════════
function openPanel(body, actions) {
    document.getElementById('panelBody').innerHTML = body;
    document.getElementById('panelActions').innerHTML = actions || '';
    document.getElementById('detailPanel').classList.add('visible');
}
function closePanel() {
    document.getElementById('detailPanel').classList.remove('visible');
    selectedTileRoom = null;
    drawAllRoomsOverlay();
}

function selectRoom(room) {
    if (isConstruction) return;
    selectedTileRoom = room;
    room.isLift ? openLiftPanel(room) : openRoomPanel(room);
    drawAllRoomsOverlay(); // redraw to show selection highlight
}

function openRoomPanel(room) {
    const sc = room.status==='online'?'#4ade80':room.status==='warning'?'#fbbf24':'#ef4444';
    document.getElementById('panelIcon').textContent     = room.icon;
    document.getElementById('panelTitle').textContent    = room.name;
    document.getElementById('panelSubtitle').textContent = FLOORS[currentFloor].name + ' • Этаж ' + currentFloor;
    openPanel(`
        <div class="panel-section">
            <div class="panel-section-title">Состояние</div>
            <div class="panel-stats">
                <div class="panel-stat"><span class="label">Статус</span><span class="value" style="color:${sc}">${room.statusText}</span></div>
                <div class="panel-stat"><span class="label">🌡️ Температура</span><span class="value">${room.temp}</span></div>
                <div class="panel-stat"><span class="label">🌬️ Кислород</span><span class="value">${room.o2}</span></div>
                <div class="panel-stat"><span class="label">⚡ Энергия</span><span class="value">${room.power}</span></div>
                <div class="panel-stat"><span class="label">👥 Экипаж</span><span class="value">${room.crew}</span></div>
                <div class="panel-stat"><span class="label">😊 Комфорт</span><span class="value">${room.comfort}</span></div>
            </div>
        </div>`,
        `<button class="panel-btn">🔧 Ремонт</button>
         <button class="panel-btn">👥 Экипаж</button>
         <button class="panel-btn">📋 Отчёт</button>`
    );
}

function openLiftPanel(room) {
    let html = '';
    Object.keys(FLOORS).forEach(n => {
        const f = FLOORS[n], cur = parseInt(n)===currentFloor;
        html += `<div class="floor-option ${cur?'current':''}" onclick="${cur?'':('closePanel();switchFloor('+n+');')}">
            <div class="floor-num">${n}</div>
            <div class="floor-info"><div class="floor-name">${f.name}</div><div class="floor-desc">${f.desc}</div></div>
            ${cur ? '<span class="floor-badge">● Здесь</span>' : '<span class="floor-arrow">→</span>'}
        </div>`;
    });
    document.getElementById('panelIcon').textContent     = '🛗';
    document.getElementById('panelTitle').textContent    = 'Лифт';
    document.getElementById('panelSubtitle').textContent = 'Этаж '+currentFloor+' • '+FLOORS[currentFloor].name;
    openPanel(`
        <div class="panel-section">
            <div class="panel-section-title">Состояние лифта</div>
            <div class="panel-stats">
                <div class="panel-stat"><span class="label">Статус</span><span class="value" style="color:#4ade80">${room.statusText}</span></div>
                <div class="panel-stat"><span class="label">📍 Текущий этаж</span><span class="value">${currentFloor}</span></div>
                <div class="panel-stat"><span class="label">⚡ Энергия</span><span class="value">${room.power}</span></div>
            </div>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">Выберите этаж</div>
            <div class="floor-list">${html}</div>
        </div>`,
        `<button class="panel-btn">🔧 Обслуживание</button>
         <button class="panel-btn primary">🚨 Экстренный вызов</button>`
    );
}

function openBuiltRoomPanel(item) {
    if (isConstruction) return;
    const rd = ROOMS_DB[item.roomType] || {};
    selectedTileRoom = null;
    document.getElementById('panelIcon').textContent     = rd.icon || '❓';
    document.getElementById('panelTitle').textContent    = rd.name || item.roomType;
    document.getElementById('panelSubtitle').textContent = FLOORS[currentFloor].name + ' • Этаж ' + currentFloor;
    const cost = item.cells.size * (rd.cost || 2);
    const fx = [];
    if (rd.oxygen)   fx.push(`O₂ ${rd.oxygen>0?'+':''}${rd.oxygen}%`);
    if (rd.heat)     fx.push(`🌡️ ${rd.heat>0?'+':''}${rd.heat}°`);
    if (rd.humidity) fx.push(`💧 ${rd.humidity>0?'+':''}${rd.humidity}%`);
    if (rd.noise)    fx.push(`🔊 ${rd.noise}дБ`);
    if (rd.energy)   fx.push(`⚡ +${rd.energy}`);
    openPanel(`
        <div class="panel-section">
            <div class="panel-section-title">Состояние</div>
            <div class="panel-stats">
                <div class="panel-stat"><span class="label">Статус</span><span class="value" style="color:#4ade80">● Построена</span></div>
                <div class="panel-stat"><span class="label">📐 Площадь</span><span class="value">${item.cells.size} тайл(ов)</span></div>
                <div class="panel-stat"><span class="label">💰 Стоимость</span><span class="value">${cost} металла</span></div>
            </div>
        </div>
        ${fx.length ? `<div class="panel-section">
            <div class="panel-section-title">Эффекты</div>
            <div class="panel-stats">
                ${fx.map(f=>`<div class="panel-stat"><span class="value">${f}</span></div>`).join('')}
            </div>
        </div>` : ''}`,
        `<button class="panel-btn">🔧 Ремонт</button>
         <button class="panel-btn">👥 Назначить</button>
         <button class="panel-btn">📋 Отчёт</button>`
    );
    drawAllRoomsOverlay();
}
function switchFloor(n) {
    if (isTransitioning || n<1 || n>3 || n===currentFloor) return;
    isTransitioning = true;
    const ov = document.getElementById('floorOverlay');
    document.getElementById('transitionIcon').textContent = n>currentFloor?'⬆️':'⬇️';
    document.getElementById('transitionText').textContent = `Лифт: этаж ${currentFloor} → этаж ${n}...`;
    ov.classList.add('active');
    setTimeout(() => {
        currentFloor = n;
        document.getElementById('levelNumber').textContent = n;
        document.getElementById('levelUp').disabled   = n>=3;
        document.getElementById('levelDown').disabled = n<=1;
        // Sync construction floor switcher
        document.getElementById('cLevelNumber').textContent = n;
        document.getElementById('cLevelUp').disabled   = n>=3;
        document.getElementById('cLevelDown').disabled = n<=1;
        renderFloor(n);
        if (isConstruction) drawCGrid();
        setTimeout(() => { ov.classList.remove('active'); isTransitioning=false; }, 400);
    }, 700);
}

// ════════════════════════════════════════════════════════
//  CONSTRUCTION MODE
// ════════════════════════════════════════════════════════
function toggleConstruction() {
    isConstruction = !isConstruction;
    const isoGrid      = document.getElementById('isoGrid');
    const gridSvg      = document.getElementById('constructionGridSvg');
    const bottom       = document.getElementById('cBottomPanel');
    const right        = document.getElementById('cRightPanel');
    const inst         = document.getElementById('cInstructions');
    const closeBtn     = document.getElementById('cCloseBtn');
    const subTabsBar   = document.getElementById('subTabsBar');
    const fabBtn       = document.getElementById('buildFabBtn');
    const topBar       = document.querySelector('.top-bar');
    const floorSwitch  = document.getElementById('cFloorSwitcher');

    if (isConstruction) {
        isoGrid.classList.add('construction-active');
        gridSvg.classList.add('active');
        right.classList.add('visible');
        closeBtn.classList.add('visible');
        subTabsBar.style.display = 'none';
        topBar.style.display = 'none';          // hide nav bar + time controls
        floorSwitch.classList.add('visible');   // show construction floor switcher
        fabBtn.classList.add('hidden');
        closePanel();

        // Auto-pause time on entering construction/marking mode
        isPaused = true;
        clearInterval(timeInterval);
        document.querySelectorAll('.playback-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('pauseBtn').classList.add('active');

        // Ensure room type list is built
        buildRoomListPanel();
        // Reset selection (start with no room chosen)
        selectedRoomType = null;
        refreshRoomList();
        updateSelectedHint();
        // Sync panels based on current selection (none)
        updateConstructionPanels();

        drawCGrid();
    } else {
        isoGrid.classList.remove('construction-active');
        gridSvg.classList.remove('active');
        bottom.classList.remove('visible');
        right.classList.remove('visible');
        inst.classList.remove('visible');
        closeBtn.classList.remove('visible');
        subTabsBar.style.display = '';
        topBar.style.display = '';              // restore nav bar
        floorSwitch.classList.remove('visible');
        fabBtn.classList.remove('hidden');
        selectedRoomType = null;
        isDragging = isRightDrag = false;
        dragA = dragB = rdragA = rdragB = null;
        document.getElementById('dragHint').style.display = 'none';
        hideRoomTooltip();
        updateSelectedHint();
        clearPreview();

        // Resume time on exiting construction mode
        isPaused = false;
        clearInterval(timeInterval);
        timeInterval = setInterval(updateTime, 1000);
        document.querySelectorAll('.playback-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('playBtn').classList.add('active');
    }
}

// ════════════════════════════════════════════════════════
//  UPDATE CONSTRUCTION PANELS BASED ON SELECTED ROOM
// ════════════════════════════════════════════════════════
function updateConstructionPanels() {
    const bottom = document.getElementById('cBottomPanel');
    const inst   = document.getElementById('cInstructions');
    const hint   = document.getElementById('cSelectedHint');
    if (!isConstruction) {
        bottom.classList.remove('visible');
        inst.classList.remove('visible');
        hint.classList.remove('visible');
        return;
    }
    // Room panel is ALWAYS visible in construction mode
    bottom.classList.add('visible');
    if (selectedRoomType) {
        inst.classList.add('visible');
        // hint visibility handled by updateSelectedHint()
    } else {
        inst.classList.remove('visible');
        hint.classList.remove('visible');
    }
}

// ════════════════════════════════════════════════════════
//  CONSTRUCTION GRID RENDER
// ════════════════════════════════════════════════════════
function getOccupiedCells() {
    const occ = new Set();
    FLOORS[currentFloor].rooms.forEach(room => {
        roomToCells(room).forEach(k => occ.add(k));
    });
    (constructedRooms[currentFloor]||[]).forEach(item => item.cells.forEach(k=>occ.add(k)));
    return occ;
}

function getQueueCellMap() {
    const m = new Map(); // key -> queue item
    buildQueue.forEach(item => {
        if (item.floor !== currentFloor) return;
        item.cells.forEach(k => m.set(k, item));
    });
    return m;
}

function drawCGrid() {
    const svg = document.getElementById('constructionGridSvg');
    svg.innerHTML = '';
    if (!isConstruction) return;

    const occ   = getOccupiedCells();
    const qmap  = getQueueCellMap();

    for (let r=0; r<GROWS; r++) {
        for (let c=0; c<GCOLS; c++) {
            const k = `${r},${c}`;
            const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
            rect.setAttribute('x', c*TILE + 0.5);
            rect.setAttribute('y', r*TILE + 0.5);
            rect.setAttribute('width',  TILE-1);
            rect.setAttribute('height', TILE-1);

            let cls = 'gc-neutral';
            if (occ.has(k)) {
                cls = 'gc-blocked';
            } else if (qmap.has(k)) {
                const qi = qmap.get(k);
                cls = (selectedRoomType && qi.roomType===selectedRoomType) ? 'gc-queue' : 'gc-queue-other';
            } else if (selectedRoomType) {
                cls = 'gc-free';
            }
            rect.setAttribute('class', cls);
            rect.dataset.r = r; rect.dataset.c = c;
            rect.addEventListener('mousedown',  e => onCellDown(e, r, c));
            rect.addEventListener('mouseenter', e => onCellEnter(e, r, c));
            rect.addEventListener('mouseleave', onCellLeave);
            svg.appendChild(rect);
        }
    }

    // ── Queue icons ──
    buildQueue.forEach(item => {
        if (item.floor !== currentFloor) return;
        let minR=99,maxR=0,minC=99,maxC=0;
        item.cells.forEach(k => {
            const [rr,cc]=k.split(',').map(Number);
            minR=Math.min(minR,rr); maxR=Math.max(maxR,rr);
            minC=Math.min(minC,cc); maxC=Math.max(maxC,cc);
        });
        const cx=(minC+maxC+1)/2*TILE, cy=(minR+maxR+1)/2*TILE;
        const t = document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',cx); t.setAttribute('y',cy);
        const active = selectedRoomType && item.roomType===selectedRoomType;
        t.setAttribute('class','gc-room-icon '+(active?'active':'inactive'));
        t.textContent = ROOMS_DB[item.roomType]?.icon || '❓';
        svg.appendChild(t);
    });

    // Refresh constructed rooms overlay
    drawAllRoomsOverlay();
}

// ════════════════════════════════════════════════════════
//  PREVIEW OVERLAY  (drawn on top, pointer-events:none)
// ════════════════════════════════════════════════════════
function clearPreview() {
    const svg = document.getElementById('constructionGridSvg');
    svg.querySelectorAll('.preview-el').forEach(e=>e.remove());
}

function drawPreview(r1,c1,r2,c2, mode) {
    // mode: 'add' | 'bad' | 'del'
    clearPreview();
    const svg  = document.getElementById('constructionGridSvg');
    const minR=Math.min(r1,r2), maxR=Math.max(r1,r2);
    const minC=Math.min(c1,c2), maxC=Math.max(c1,c2);
    const cls  = mode==='add'?'gc-preview-add': mode==='del'?'gc-preview-del':'gc-preview-bad';
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',      minC*TILE + 1);
    rect.setAttribute('y',      minR*TILE + 1);
    rect.setAttribute('width',  (maxC-minC+1)*TILE - 2);
    rect.setAttribute('height', (maxR-minR+1)*TILE - 2);
    rect.setAttribute('class',  cls);
    rect.setAttribute('pointer-events','none');
    rect.classList.add('preview-el');
    svg.appendChild(rect);

    // Dimensions hint
    const hint = document.getElementById('dragHint');
    hint.textContent = `${maxC-minC+1} × ${maxR-minR+1}`;
    hint.style.display = 'block';
    // position near cursor — handled in onCellEnter
}

// ════════════════════════════════════════════════════════
//  MOUSE HANDLERS ON GRID CELLS
// ════════════════════════════════════════════════════════
function onCellDown(e, r, c) {
    if (!isConstruction) return;
    e.preventDefault();

    if (e.button === 0) {            // ── LMB: mark ──
        if (isRightDrag) return;
        if (!selectedRoomType) return;
        const occ = getOccupiedCells();
        if (occ.has(`${r},${c}`)) return;
        isDragging = true; dragMoved = false;
        dragA = {r,c}; dragB = {r,c};
        // Immediately create preview queue item for feedback
        previewQueueItem = {
            id: 'preview',
            floor: currentFloor,
            roomType: selectedRoomType,
            cells: new Set([`${r},${c}`]),
            status: 'marking'
        };
        updatePreviewUI();
        updateLmbPreview();
    } else if (e.button === 2) {     // ── RMB: erase / deselect ──
        if (isDragging) return;
        isRightDrag = true; dragMoved = false;
        rdragA = {r,c}; rdragB = {r,c};
        // Switch to broom cursor during erase
        const svg = document.getElementById('constructionGridSvg');
        if (svg && selectedRoomType) svg.classList.add('erasing');
        updateRmbPreview();
    }
}

function onCellEnter(e, r, c) {
    if (!isConstruction) return;

    // ── Update drag end for LMB ──
    if (isDragging && dragA) {
        dragB = {r,c}; dragMoved = true;
        updateLmbPreview();
        positionHint(e);
    }
    // ── Update drag end for RMB ──
    if (isRightDrag && rdragA) {
        rdragB = {r,c}; dragMoved = true;
        updateRmbPreview();
        positionHint(e);
    }
}

function onCellLeave() {
    // keep drag going — handled by window mouseup
}

function positionHint(e) {
    const hint = document.getElementById('dragHint');
    const rect = document.getElementById('mainCanvas').getBoundingClientRect();
    hint.style.left = (e.clientX - rect.left + 14) + 'px';
    hint.style.top  = (e.clientY - rect.top  - 28) + 'px';
}

function updateLmbPreview() {
    if (!dragA || !dragB || !selectedRoomType) return;
    const occ  = getOccupiedCells();
    const qmap = getQueueCellMap();
    const minR=Math.min(dragA.r,dragB.r), maxR=Math.max(dragA.r,dragB.r);
    const minC=Math.min(dragA.c,dragB.c), maxC=Math.max(dragA.c,dragB.c);
    // Check if at least one free cell
    let hasConflict = false;
    for (let r=minR;r<=maxR;r++) for (let c=minC;c<=maxC;c++) {
        const k=`${r},${c}`;
        if (occ.has(k)) { hasConflict=true; break; }
    }
    drawPreview(dragA.r,dragA.c,dragB.r,dragB.c, hasConflict?'bad':'add');

    // Update preview queue item cells
    if (previewQueueItem && !hasConflict) {
        previewQueueItem.cells = new Set();
        for (let r=minR;r<=maxR;r++)
            for (let c=minC;c<=maxC;c++)
                if (!occ.has(`${r},${c}`))
                    previewQueueItem.cells.add(`${r},${c}`);
        updatePreviewUI();
    }
}

function updateRmbPreview() {
    if (!rdragA || !rdragB) return;
    drawPreview(rdragA.r,rdragA.c,rdragB.r,rdragB.c, 'del');
}

// ════════════════════════════════════════════════════════
//  MOUSEUP — commit drag
// ════════════════════════════════════════════════════════
window.addEventListener('mouseup', e => {
    if (!isConstruction) return;

    if (e.button === 0 && isDragging) {
        isDragging = false;
        // Remove preview item before committing real one
        previewQueueItem = null;
        updatePreviewUI();
        commitMark();
        dragA = dragB = null;
        clearPreview();
        document.getElementById('dragHint').style.display = 'none';
    }

    if (e.button === 2 && isRightDrag) {
        isRightDrag = false;
        // Restore hammer cursor
        const svg = document.getElementById('constructionGridSvg');
        if (svg) svg.classList.remove('erasing');

        if (!dragMoved && rdragA) {
            // ── Single right-click: deselect if cell is not in selected type's queue ──
            const k = `${rdragA.r},${rdragA.c}`;
            const qmap = getQueueCellMap();
            const onSelected = qmap.has(k) && selectedRoomType &&
                               qmap.get(k).roomType === selectedRoomType;
            if (!onSelected) {
                hideRoomTooltip(); // ← добавить
                selectedRoomType = null;
                refreshRoomList();
                updateSelectedHint();
                updateConstructionPanels();
                drawCGrid();
                rdragA = rdragB = null;
                clearPreview();
                document.getElementById('dragHint').style.display = 'none';
                return;
            }
        }

        commitErase();
        rdragA = rdragB = null;
        clearPreview();
        document.getElementById('dragHint').style.display = 'none';
    }
});

window.addEventListener('contextmenu', e => { if (isConstruction) e.preventDefault(); });

function commitMark() {
    if (!dragA || !selectedRoomType) return;
    hideRoomTooltip(); // ← добавить
    const B = dragB || dragA;
    const minR=Math.min(dragA.r,B.r), maxR=Math.max(dragA.r,B.r);
    const minC=Math.min(dragA.c,B.c), maxC=Math.max(dragA.c,B.c);
    const occ  = getOccupiedCells();
    const newCells = [];
    for (let r=minR;r<=maxR;r++)
        for (let c=minC;c<=maxC;c++)
            if (!occ.has(`${r},${c}`)) newCells.push(`${r},${c}`);
    if (!newCells.length) return;

    const ns = new Set(newCells);
    let merged = false;
    for (const item of buildQueue) {
        if (item.floor!==currentFloor || item.roomType!==selectedRoomType) continue;
        // merge if any neighbor
        const adj = [...item.cells].some(k => {
            const [rr,cc]=k.split(',').map(Number);
            return [[rr-1,cc],[rr+1,cc],[rr,cc-1],[rr,cc+1]].some(([nr,nc])=>ns.has(`${nr},${nc}`));
        });
        if (adj || [...ns].some(k=>item.cells.has(k))) {
            newCells.forEach(k=>item.cells.add(k));
            merged = true; break;
        }
    }
    if (!merged) {
        buildQueue.push({ id:Date.now(), floor:currentFloor, roomType:selectedRoomType, cells:ns, committed: false });
    }
    updateQueueUI();
    drawCGrid();
}

function commitErase() {
    if (!rdragA) return;
    const B = rdragB || rdragA;
    const minR=Math.min(rdragA.r,B.r), maxR=Math.max(rdragA.r,B.r);
    const minC=Math.min(rdragA.c,B.c), maxC=Math.max(rdragA.c,B.c);
    let changed = false;
    for (let i=buildQueue.length-1;i>=0;i--) {
        const item = buildQueue[i];
        if (item.floor!==currentFloor) continue;
        // Only erase cells of selected type (or all if none selected)
        if (selectedRoomType && item.roomType!==selectedRoomType) continue;
        for (let r=minR;r<=maxR;r++)
            for (let c=minC;c<=maxC;c++) {
                const k=`${r},${c}`;
                if (item.cells.delete(k)) changed=true;
            }
        if (item.cells.size===0) buildQueue.splice(i,1);
    }
    if (changed) { updateQueueUI(); drawCGrid(); }
}

// ════════════════════════════════════════════════════════
//  QUEUE UI  (структура DOM не пересоздаётся во время DnD)
// ════════════════════════════════════════════════════════

// Два режима обновления:
//   rebuildQueueDOM()  — полная перерисовка (добавление/удаление элементов)
//   tickQueueTimers()  — только обновляет прогресс/таймер уже существующих элементов

let _queueDomIds = [];   // порядок id в DOM — чтобы не пересоздавать без нужды

function updateQueueUI() {
    // Show ALL items across all floors
    const all = buildQueue;
    const ids = all.map(i => i.id);
    if (JSON.stringify(ids) !== JSON.stringify(_queueDomIds)) {
        rebuildQueueDOM(all);
        _queueDomIds = ids.slice();
    } else {
        tickQueueTimers(all);
    }

    const btn = document.getElementById('cBuildBtn');
    const cnt = document.getElementById('cQueueCount');

    const allUncommitted = buildQueue.filter(i => !i.committed);
    const allCommitted   = buildQueue.filter(i =>  i.committed);

    // Badge shows total queue size across all floors
    cnt.textContent   = buildQueue.length;
    cnt.style.display = buildQueue.length ? '' : 'none';

    if (allUncommitted.length) {
        btn.disabled = false;
        btn.textContent = `⚙️ Построить (${allUncommitted.length})`;
        btn.classList.toggle('new-batch', isBuildingActive || allCommitted.length > 0);
    } else if (isBuildingActive) {
        btn.disabled = true;
        btn.textContent = '⏳ Строится...';
        btn.classList.remove('new-batch');
    } else {
        btn.disabled = true;
        btn.textContent = '⚙️ Построить (0)';
        btn.classList.remove('new-batch');
    }
}

// ── Preview queue item UI (shown during active drag — "Разметка" status) ──
function updatePreviewUI() {
    const list = document.getElementById('cQueueList');
    if (!list) return;
    const existingEl = list.querySelector('.c-queue-item[data-id="preview"]');

    if (!previewQueueItem) {
        if (existingEl) existingEl.remove();
        // If queue is now empty and no preview, restore empty message if needed
        if (!buildQueue.length &&
            !list.querySelector('.c-queue-item') &&
            !list.querySelector('.c-queue-empty')) {
            list.innerHTML = '<div class="c-queue-empty">Очередь пуста.<br/>ЛКМ — разметить, ПКМ — удалить.</div>';
        }
        return;
    }

    const rd = ROOMS_DB[previewQueueItem.roomType] || {};
    const cost = previewQueueItem.cells.size * (rd.cost || 2);
    const html = `<div class="c-queue-item marking" data-id="preview">
        <div class="c-queue-item-name">${rd.icon||'❓'} ${rd.name||previewQueueItem.roomType}</div>
        <div class="c-queue-item-meta">${previewQueueItem.cells.size} тайл(ов) • Этаж ${previewQueueItem.floor} • ${cost} металла</div>
        <div class="c-queue-item-marking-label">📐 Разметка...</div>
    </div>`;

    if (existingEl) {
        existingEl.outerHTML = html;
    } else {
        // Remove empty message if present
        const emptyEl = list.querySelector('.c-queue-empty');
        if (emptyEl) emptyEl.remove();
        list.insertAdjacentHTML('beforeend', html);
    }
}

function rebuildQueueDOM(all) {
    const list  = document.getElementById('cQueueList');
    const total = document.getElementById('cQueueTotal');

    if (!all.length) {
        list.innerHTML = '<div class="c-queue-empty">Очередь пуста.<br/>ЛКМ — разметить, ПКМ — удалить.</div>';
        total.style.display = 'none';
        return;
    }

    function renderItem(item) {
        const rd = ROOMS_DB[item.roomType] || {};
        const cost = item.cells.size * (rd.cost || 2);
        const isBuilding = buildingState && buildingState.id === item.id;
        const totalTime  = (BUILD_TIMES[item.roomType] || 20) * 1000;
        const progress   = item.progress || 0;
        const pct     = Math.min(100, Math.round(progress / totalTime * 100));
        const remSec  = Math.ceil((totalTime - progress) / 1000);
        const statusCls  = isBuilding ? 's-building' : 's-marked';
        const statusText = isBuilding ? 'Строится' : 'Размечено';
        const allIdx  = all.indexOf(item);
        const allFirst = allIdx === 0;
        const allLast  = allIdx === all.length - 1;
        // floor badge — clicking jumps to that floor
        const isCurrentFloor = item.floor === currentFloor;
        const floorBadge = `<span class="c-queue-floor-link${isCurrentFloor ? ' current' : ''}" onclick="switchFloor(${item.floor})" title="Перейти на этаж ${item.floor}">🏢 Этаж ${item.floor}</span>`;
        return `<div class="c-queue-item${isBuilding ? ' building' : ''}"
                     data-id="${item.id}"
                     data-committed="${item.committed ? '1' : '0'}"
                     style="border-left-color:${isBuilding ? '#00e5ff' : item.committed ? '#ffaa33' : '#4a9aff'}">
            <div class="c-queue-order-ctrl">
                <button class="c-queue-order-btn" ${allFirst ? 'disabled' : ''} onclick="moveQueueItem(${item.id},-1)">▲</button>
                <div class="c-queue-drag-handle" data-drag-id="${item.id}">⠿</div>
                <button class="c-queue-order-btn" ${allLast ? 'disabled' : ''} onclick="moveQueueItem(${item.id},1)">▼</button>
            </div>
            <button class="c-queue-cancel" onclick="removeQueueItem(${item.id})">✕</button>
            <div class="c-queue-item-name">${rd.icon || '❓'} ${rd.name || item.roomType}${isBuilding ? ' 🔨' : ''} <span class="c-queue-status ${statusCls}">${statusText}</span></div>
            <div class="c-queue-item-meta">${item.cells.size} тайл(ов) • ${floorBadge} • ${cost} металла</div>
            <div class="c-queue-item-timer" style="display:${(isBuilding || progress > 0) ? 'block' : 'none'}">
                <div class="c-queue-timer" style="color:${isBuilding ? '#00e5ff' : '#778'}">
                    ${isBuilding ? `⏱ ${remSec}с осталось` : `⏸ ${Math.round(progress / 1000)}с / ${Math.round(totalTime / 1000)}с`}
                </div>
                <div class="c-queue-progress"><div class="c-queue-progress-bar" style="width:${pct}%;${isBuilding ? '' : 'opacity:0.4'}"></div></div>
            </div>
        </div>`;
    }

    // Group by committed vs uncommitted, preserve order within each group
    const committed   = all.filter(i =>  i.committed);
    const uncommitted = all.filter(i => !i.committed);
    const hasBoth     = committed.length > 0 && uncommitted.length > 0;

    let html = '';
    committed.forEach(item => { html += renderItem(item); });
    if (hasBoth) {
        html += `<div class="c-queue-batch-divider">Ожидают запуска</div>`;
    }
    uncommitted.forEach(item => { html += renderItem(item); });

    list.innerHTML = html;

    list.querySelectorAll('.c-queue-drag-handle').forEach(handle => {
        handle.addEventListener('pointerdown', onHandlePointerDown);
    });

    const totalCost  = all.reduce((s, i) => s + (i.cells.size * (ROOMS_DB[i.roomType]?.cost || 2)), 0);
    const totalTiles = all.reduce((s, i) => s + i.cells.size, 0);
    total.style.display = '';
    total.innerHTML = `
        <div class="c-queue-total-line"><span>Тайлов:</span><span>${totalTiles}</span></div>
        <div class="c-queue-total-line bold"><span>Итого металла:</span><span>${totalCost}</span></div>`;
}

function tickQueueTimers(all) {
    all.forEach(item => {
        const el = document.querySelector(`.c-queue-item[data-id="${item.id}"]`);
        if (!el) return;
        const rd         = ROOMS_DB[item.roomType]||{};
        const isBuilding = buildingState && buildingState.id === item.id;
        const totalTime  = (BUILD_TIMES[item.roomType]||20)*1000;
        const progress   = item.progress || 0;
        const pct        = Math.min(100, Math.round(progress / totalTime * 100));
        const remSec     = Math.ceil((totalTime - progress) / 1000);

        const cost   = item.cells.size * (rd.cost||2);
        const isCurrentFloor = item.floor === currentFloor;
        const floorBadge = `<span class="c-queue-floor-link${isCurrentFloor ? ' current' : ''}" onclick="switchFloor(${item.floor})" title="Перейти на этаж ${item.floor}">🏢 Этаж ${item.floor}</span>`;
        const metaEl = el.querySelector('.c-queue-item-meta');
        if (metaEl) metaEl.innerHTML = `${item.cells.size} тайл(ов) • ${floorBadge} • ${cost} металла`;

        const timerEl   = el.querySelector('.c-queue-item-timer');
        const timerText = el.querySelector('.c-queue-timer');
        const barEl     = el.querySelector('.c-queue-progress-bar');
        if (timerEl) timerEl.style.display = (isBuilding || progress > 0) ? 'block' : 'none';
        if (timerText) {
            timerText.style.color = isBuilding ? '#00e5ff' : '#778';
            timerText.textContent = isBuilding
                ? `⏱ ${remSec}с осталось`
                : `⏸ ${Math.round(progress/1000)}с / ${Math.round(totalTime/1000)}с`;
        }
        if (barEl) {
            barEl.style.width   = pct + '%';
            barEl.style.opacity = isBuilding ? '1' : '0.4';
        }
        el.style.borderLeftColor = isBuilding ? '#00e5ff' : (item.committed ? '#ffaa33' : '#4a9aff');
        el.classList.toggle('building', !!isBuilding);
        const nameEl = el.querySelector('.c-queue-item-name');
        if (nameEl) {
            const statusBadge = `<span class="c-queue-status ${isBuilding?'s-building':'s-marked'}">${isBuilding?'Строится':'Размечено'}</span>`;
            nameEl.innerHTML = `${rd.icon||'❓'} ${rd.name||item.roomType}${isBuilding?' 🔨':''} ${statusBadge}`;
        }
    });

    // Пересчёт итоговой строки
